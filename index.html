<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senshi-React AI</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    /* Estilos optimizados para que nada se oculte */
    body { 
      margin: 0; 
      background: #000; 
      color: white; 
      font-family: sans-serif; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }

    #status { 
      padding: 15px; 
      background: #222; 
      font-size: 20px; 
      font-weight: bold; 
      border-bottom: 4px solid #FFD700; /* Color Mostaza */
      text-align: center;
    }

    #container { 
      position: relative; 
      flex-grow: 1; /* Esto hace que la cámara use el espacio disponible */
      background: #111; 
      overflow: hidden;
    }

    #input_video { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
      opacity: 0; 
    }

    #output_canvas { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
    }
    
    /* Contenedor de botones fijo abajo */
    .controls { 
      padding: 20px; 
      background: #000;
      display: flex; 
      flex-direction: column; 
      gap: 10px;
    }

    button { 
      width: 100%;
      padding: 20px; 
      font-size: 18px; 
      font-weight: bold; 
      border: none; 
      border-radius: 10px; 
      text-transform: uppercase;
    }

    #btn_start { 
      background: #FFD700; /* Mostaza */
      color: #000; 
    }

    #btn_entrenar { 
      background: #FFF; 
      color: #000; 
      display: none; /* Se activa después de la cámara */
    }
  </style>
</head>
<body>

  <div id="status">SISTEMA LISTO</div>
  
  <div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="btn_start">1. ACTIVAR CÁMARA</button>
    <button id="btn_entrenar">2. INICIAR ENTRENAMIENTO</button>
  </div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    const btnStart = document.getElementById('btn_start');
    const btnEntrenar = document.getElementById('btn_entrenar');

    let etapa = "ESPERANDO"; 
    let tiempoEstimulo = 0;
    let tiempoReaccion = 0;
    
    // VARIABLES DE CALIBRACIÓN
    let zBaseDer = 0;
    let zBaseIzq = 0;
    let sensibilidad = 0.15; // Cuánta distancia debe recorrer el puño (0.15 es aprox. 20-30cm)

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, landmarks, {color: '#FFD700', lineWidth: 1});

        // Puntos clave para la lógica
        const munecaDer = landmarks[16];
        const munecaIzq = landmarks[15];
        const hombroDer = landmarks[12];
        const hombroIzq = landmarks[11];

        // FASE DE ESTIMULO: Solo aquí medimos la reacción
        if (etapa === "ESTIMULO") {
          const tiempoTranscurrido = performance.now() - tiempoEstimulo;

          // CÁLCULO DE EXTENSIÓN:
          // Comparamos la profundidad de la muñeca contra el hombro.
          // Un valor de 0.4 de diferencia suele indicar una extensión frontal casi completa (cerca de la cámara).
          const extensionDer = hombroDer.z - munecaDer.z;
          const extensionIzq = hombroIzq.z - munecaIzq.z;

          // REGLA: Debe haber una extensión clara (brazo proyectado al frente)
          // Ajusta el 0.45 si quieres que necesite acercarse aún más (0.50) o menos (0.40)
          if ((extensionDer > 0.45 || extensionIzq > 0.45) && tiempoTranscurrido > 180) {
            tiempoReaccion = tiempoTranscurrido;
            finalizarGolpe();
          }
        }
      }
      canvasCtx.restore();
    });

    function lanzarEstimulo() {
      etapa = "ESTIMULO";
      tiempoEstimulo = performance.now();
      statusDiv.innerText = "¡GOLPEA YA!";
      statusDiv.style.background = "#FF0000"; 
      statusDiv.style.color = "white";
    }

    function finalizarGolpe() {
      etapa = "GOLPE";
      const segs = (tiempoReaccion / 1000).toFixed(3);
      statusDiv.innerText = `TIEMPO: ${segs}s`;
      statusDiv.style.background = "#FFD700"; 
      statusDiv.style.color = "black";
    }

    function prepararSiguiente() {
      etapa = "PREPARANDO";
      statusDiv.innerText = "¡EN GUARDIA! (No te muevas)";
      statusDiv.style.background = "#222";
      statusDiv.style.color = "white";
      
      // Espera aleatoria para que el atleta no prediga el color rojo
      const espera = Math.floor(Math.random() * 3000) + 2000;
      setTimeout(() => {
        if(etapa === "PREPARANDO") lanzarEstimulo();
      }, espera);
    }

    btnStart.addEventListener('click', async () => {
      statusDiv.innerText = "CONECTANDO IA...";
      try {
        const camera = new Camera(videoElement, {
          onFrame: async () => { await pose.send({image: videoElement}); },
          width: 640, height: 480
        });
        await camera.start();
        btnStart.style.display = "none";
        btnEntrenar.style.display = "block"; 
        statusDiv.innerText = "SISTEMA LISTO";
      } catch (e) {
        statusDiv.innerText = "ERROR DE CÁMARA";
      }
    });

    btnEntrenar.addEventListener('click', () => {
      prepararSiguiente();
    });
  </script>
</body>
</html>
