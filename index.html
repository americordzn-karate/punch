<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-React AI v2.6 - Buzzer & Semáforo</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    #top-controls {
      position: absolute; top: 10px; left: 10px; right: 10px; z-index: 300; display: flex; flex-direction: column; gap: 10px;
    }
    .btn-row { display: flex; gap: 10px; }
    
    /* El recuadro dinámico */
    #status-display { 
      background: rgba(40,40,40,0.9); padding: 15px; border-radius: 10px; border: 3px solid #FFD700;
      font-size: 22px; font-weight: bold; text-align: center; flex-grow: 1; transition: all 0.2s ease;
      color: #fff; text-shadow: 1px 1px 2px #000;
    }

    #main-view { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
    
    #debug-info { 
      position: absolute; bottom: 100px; left: 20px; background: rgba(0,0,0,0.7); 
      padding: 10px; border-radius: 5px; font-family: monospace; color: #0f0; border: 1px solid #333; font-size: 14px;
    }

    #arm-selector { display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; border: 1px solid #444; }
    .arm-btn {
      padding: 10px; border: 1px solid #FFD700; background: #222; color: #FFD700; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer;
    }
    .arm-btn.active { background: #FFD700; color: #000; }

    button.action-btn { 
      padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; 
      text-transform: uppercase; cursor: pointer; flex: 1; box-shadow: 0 4px 0 #999;
    }
    button.action-btn:active { transform: translateY(3px); box-shadow: none; }
    .btn-camera { background: #FFD700; color: #000; box-shadow: 0 4px 0 #b39700; }
    .btn-start { background: #fff; color: #000; display: none; }

    #results-panel { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.95); border: 3px solid #FFD700; border-radius: 15px; 
      padding: 30px; display: none; z-index: 400; width: 85%; text-align: center; 
    }
    #series-counter { position: absolute; bottom: 30px; width: 100%; text-align: center; font-weight: bold; color: #FFD700; font-size: 18px; }
    #input_video { display: none; }
  </style>
</head>
<body>

  <div id="top-controls">
    <div class="btn-row">
        <div id="status-display">SISTEMA INICIALIZADO</div>
        <div id="arm-selector">
            <div id="btn-left" class="arm-btn" onclick="selectArm('L')">IZQ</div>
            <div id="btn-right" class="arm-btn active" onclick="selectArm('R')">DER</div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btn-camera" class="action-btn btn-camera" onclick="activarCamara()">1. ENCENDER CÁMARA</button>
        <button id="btn-start-serie" class="action-btn btn-start" onclick="iniciarSerie()">2. INICIAR SERIE (10)</button>
    </div>
  </div>
  
  <div id="main-view">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="debug-info">ÁNGULO: --</div>
    
    <div id="results-panel">
      <h2 style="color:#FFD700; margin:0;">REPORTE FINAL</h2>
      <div id="stats-content"></div>
      <button class="action-btn btn-camera" onclick="location.reload()" style="width:100%; margin-top:20px;">NUEVA SERIE</button>
    </div>
  </div>

  <div id="series-counter">LISTO PARA LA PRUEBA</div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');
    const debugText = document.getElementById('debug-info');
    const counterText = document.getElementById('series-counter');

    let modo = "OFF"; 
    let selectedArm = "R";
    let t_inicio = 0;
    let registros = [];

    // Generador de Sonido de Chicharra (Buzzer)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBuzzer() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc1.type = "sawtooth"; // Forma de onda áspera para chicharra
        osc1.frequency.value = 150;
        osc2.type = "square";
        osc2.frequency.value = 155; // Desafinado para crear efecto "grit"

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        
        osc1.start(); osc2.start();
        osc1.stop(audioCtx.currentTime + 0.4);
        osc2.stop(audioCtx.currentTime + 0.4);
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    function selectArm(side) {
      selectedArm = side;
      document.getElementById('btn-left').classList.toggle('active', side === 'L');
      document.getElementById('btn-right').classList.toggle('active', side === 'R');
    }

    function calcAng(p1, p2, p3) {
      if(!p1 || !p2 || !p3) return 0;
      let angle = (Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x)) * 180 / Math.PI;
      angle = Math.abs(angle);
      if (angle > 180) angle = 360 - angle;
      return angle;
    }

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (res.poseLandmarks) {
        const landmarks = res.poseLandmarks;
        let cAngle = 0;
        let p = [];

        if (selectedArm === 'R') {
            cAngle = calcAng(landmarks[12], landmarks[14], landmarks[16]);
            p = [12, 14, 16];
        } else {
            cAngle = calcAng(landmarks[11], landmarks[13], landmarks[15]);
            p = [11, 13, 15];
        }

        const colorTrack = selectedArm === 'R' ? '#FFD700' : '#00E5FF';
        
        // Dibujo de líneas y nodos
        canvasCtx.beginPath();
        canvasCtx.moveTo(landmarks[p[0]].x * canvasElement.width, landmarks[p[0]].y * canvasElement.height);
        canvasCtx.lineTo(landmarks[p[1]].x * canvasElement.width, landmarks[p[1]].y * canvasElement.height);
        canvasCtx.lineTo(landmarks[p[2]].x * canvasElement.width, landmarks[p[2]].y * canvasElement.height);
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 5;
        canvasCtx.stroke();

        drawLandmarks(canvasCtx, [landmarks[p[0]], landmarks[p[1]], landmarks[p[2]]], {color: colorTrack, lineWidth: 2});
        
        debugText.innerText = `ÁNGULO ${selectedArm}: ${Math.round(cAngle)}°`;

        if (modo === "ATAQUE") {
          const t_actual = performance.now();
          const lapso = t_actual - t_inicio;
          if (cAngle > 165 && lapso > 100) { 
            evaluarGolpe(lapso);
          }
        }
      }
      canvasCtx.restore();
    });

    function evaluarGolpe(tiempoMs) {
      modo = "PAUSA";
      const segs = tiempoMs / 1000;
      registros.push(segs);
      
      // Lógica de Colores y Mensajes
      if (segs < 0.50) {
        statusText.style.background = "#28a745"; // Verde
        statusText.innerText = `EXCELENTE! ${segs.toFixed(3)}s`;
      } else if (segs <= 0.70) {
        statusText.style.background = "#ffc107"; // Amarillo
        statusText.style.color = "#000";
        statusText.innerText = `BIEN: ${segs.toFixed(3)}s`;
      } else {
        statusText.style.background = "#dc3545"; // Rojo
        statusText.innerText = `MUY LENTO: ${segs.toFixed(3)}s`;
      }

      counterText.innerText = `GOLPES: ${registros.length} / 10`;

      if (registros.length < 10) {
        setTimeout(esperaAleatoria, 2500);
      } else {
        finalizarSerie();
      }
    }

    function finalizarSerie() {
      modo = "FIN";
      const avg = (registros.reduce((a, b) => a + b, 0) / 10).toFixed(3);
      const min = Math.min(...registros).toFixed(3);
      
      document.getElementById('stats-content').innerHTML = `
        <h1 style="color:#FFD700; font-size:60px; margin:10px 0;">${avg}s</h1>
        <p>VELOCIDAD PROMEDIO</p>
        <p style="color:#28a745">MEJOR TIEMPO: ${min}s</p>
      `;
      document.getElementById('results-panel').style.display = "block";
    }

    function esperaAleatoria() {
      modo = "ESPERA";
      statusText.style.background = "rgba(40,40,40,0.9)";
      statusText.style.color = "#fff";
      statusText.innerText = "¡EN GUARDIA!";
      
      setTimeout(() => {
        if(modo === "ESPERA") {
            modo = "ATAQUE";
            t_inicio = performance.now();
            playBuzzer(); // DISPARO DE CHICHARRA
            statusText.innerText = "¡GOLPEA!";
            statusText.style.background = "#f00";
        }
      }, Math.random() * 3000 + 2000);
    }

    async function activarCamara() {
      const cam = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
      });
      await cam.start();
      document.getElementById('btn-camera').style.display = "none";
      document.getElementById('btn-start-serie').style.display = "block";
    }

    function iniciarSerie() {
      registros = [];
      document.getElementById('results-panel').style.display = "none";
      esperaAleatoria();
    }
  </script>
</body>
</html>
