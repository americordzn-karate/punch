<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senshi-React AI - Calibración Automática</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #status { padding: 20px; background: #222; font-size: 22px; font-weight: bold; border-bottom: 4px solid #FFD700; text-align: center; }
    #container { position: relative; flex-grow: 1; background: #111; }
    #input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; }
    #output_canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .controls { padding: 25px; background: #000; display: flex; flex-direction: column; gap: 12px; }
    button { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; text-transform: uppercase; cursor: pointer; }
    #btn_start { background: #FFD700; color: #000; }
    #btn_entrenar { background: #FFF; color: #000; display: none; }
  </style>
</head>
<body>

  <div id="status">SISTEMA LISTO</div>
  
  <div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="btn_start">1. ACTIVAR CÁMARA</button>
    <button id="btn_entrenar">2. INICIAR ENTRENAMIENTO</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    const btnStart = document.getElementById('btn_start');
    const btnEntrenar = document.getElementById('btn_entrenar');

    let etapa = "ESPERANDO"; 
    let tiempoEstimulo = 0;
    let tiempoReaccion = 0;

    // Variables de Calibración Automática
    let distanciaBase = 0;
    let umbralDinamico = 0;

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, landmarks, {color: '#FFD700', lineWidth: 1});

        // Calculamos distancia Hombro-Muñeca actual
        const dDer = Math.hypot(landmarks[12].x - landmarks[16].x, landmarks[12].y - landmarks[16].y);
        const dIzq = Math.hypot(landmarks[11].x - landmarks[15].x, landmarks[11].y - landmarks[15].y);
        const maxDist = Math.max(dDer, dIzq);

        // EN GUARDIA: Guardamos la distancia en reposo
        if (etapa === "PREPARANDO") {
          distanciaBase = maxDist;
          // El umbral es la distancia base + 30% de incremento
          umbralDinamico = distanciaBase * 1.30;
        }

        // EN ESTIMULO: Esperamos que supere el umbral dinámico
        if (etapa === "ESTIMULO") {
          const tiempoTranscurrido = performance.now() - tiempoEstimulo;

          if (maxDist > umbralDinamico && tiempoTranscurrido > 150) {
            tiempoReaccion = tiempoTranscurrido;
            finalizarGolpe();
          }
        }
      }
      canvasCtx.restore();
    });

    function lanzarEstimulo() {
      etapa = "ESTIMULO";
      tiempoEstimulo = performance.now();
      statusDiv.innerText = "¡GOLPEA!";
      statusDiv.style.background = "#FF0000"; 
      statusDiv.style.color = "white";
    }

    function finalizarGolpe() {
      etapa = "GOLPE";
      const segs = (tiempoReaccion / 1000).toFixed(3);
      statusDiv.innerText = `REACCIÓN: ${segs}s`;
      statusDiv.style.background = "#FFD700"; 
      statusDiv.style.color = "black";
    }

    function prepararSiguiente() {
      etapa = "PREPARANDO";
      statusDiv.innerText = "¡EN GUARDIA! NO TE MUEVAS";
      statusDiv.style.background = "#222";
      statusDiv.style.color = "white";
      const espera = Math.floor(Math.random() * 3000) + 2000;
      setTimeout(() => { if(etapa === "PREPARANDO") lanzarEstimulo(); }, espera);
    }

    btnStart.addEventListener('click', async () => {
      statusDiv.innerText = "CARGANDO IA...";
      try {
        const camera = new Camera(videoElement, {
          onFrame: async () => { await pose.send({image: videoElement}); },
          width: 640, height: 480
        });
        await camera.start();
        btnStart.style.display = "none";
        btnEntrenar.style.display = "block"; 
        statusDiv.innerText = "SISTEMA LISTO";
      } catch (e) {
        statusDiv.innerText = "ERROR DE CÁMARA";
      }
    });

    btnEntrenar.addEventListener('click', () => { prepararSiguiente(); });
  </script>
</body>
</html>
