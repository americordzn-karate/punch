<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- Forzamos la política de permisos para el iframe de Google Sites -->
  <meta http-equiv="Permissions-Policy" content="camera=self">
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
    #container { position: relative; width: 100vw; height: 70vh; background: #111; overflow: hidden; }
    #input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; }
    #output_canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #status { padding: 15px; background: #222; font-size: 14px; border-bottom: 2px solid #FFD700; }
    #btn_start { 
      padding: 15px 30px; font-size: 18px; background: #FFD700; color: black; 
      border: none; border-radius: 5px; cursor: pointer; margin: 20px; font-weight: bold;
    }
    .instrucciones { font-size: 12px; color: #aaa; padding: 10px; }
  </style>
</head>
<body>

  <div id="status">ESTADO: ESPERANDO ACTIVACIÓN</div>
  
  <button id="btn_start">1. ACTIVAR SENSORES</button>
  
  <div class="instrucciones">
    Si al presionar no sucede nada, asegúrate de dar "Permitir" en la ventana emergente del navegador.
  </div>

  <div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    const btnStart = document.getElementById('btn_start');

    // Configuración de Pose
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Dibujamos la imagen de la cámara en el lienzo
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        statusDiv.innerText = "SISTEMA OK: ATLETA EN CUADRO";
        statusDiv.style.color = "#00FF00";
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FFD700', lineWidth: 1});
      } else {
        statusDiv.innerText = "ADVERTENCIA: BUSCANDO ATLETA...";
        statusDiv.style.color = "#FFD700";
      }
      canvasCtx.restore();
    });

    async function startApp() {
      statusDiv.innerText = "INICIANDO CÁMARA...";
      
      try {
        // Solicitud explícita de stream antes de iniciar MediaPipe Camera
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" }, 
          audio: false 
        });
        videoElement.srcObject = stream;
        videoElement.play();

        const camera = new Camera(videoElement, {
          onFrame: async () => { await pose.send({image: videoElement}); },
          width: 640, height: 480
        });
        
        await camera.start();
        btnStart.style.display = "none";
        statusDiv.innerText = "SISTEMA LISTO";

      } catch (err) {
        console.error("Error detallado:", err);
        statusDiv.innerText = "ERROR: " + err.name + ". Revisa permisos de cámara en tu navegador.";
        statusDiv.style.color = "#FF4444";
      }
    }

    btnStart.onclick = () => {
      startApp();
    };
  </script>
</body>
</html>
