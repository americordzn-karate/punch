<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-React AI v2.5 - Audio & Lateral</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* Botones Superpuestos */
    #top-controls {
      position: absolute; top: 10px; left: 10px; right: 10px; z-index: 300; display: flex; flex-direction: column; gap: 10px;
    }
    .btn-row { display: flex; gap: 10px; }
    
    #status-display { 
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border-left: 5px solid #FFD700;
      font-size: 20px; font-weight: bold; text-align: center; flex-grow: 1;
    }

    #main-view { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
    
    #debug-info { 
      position: absolute; bottom: 100px; left: 20px; background: rgba(0,0,0,0.7); 
      padding: 10px; border-radius: 5px; font-family: monospace; color: #0f0; border: 1px solid #333;
    }

    #arm-selector { display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; }
    .arm-btn {
      padding: 10px; border: 1px solid #FFD700; background: #222; color: #FFD700; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer;
    }
    .arm-btn.active { background: #FFD700; color: #000; }

    button.action-btn { 
      padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; 
      text-transform: uppercase; cursor: pointer; flex: 1;
    }
    .btn-camera { background: #FFD700; color: #000; }
    .btn-start { background: #fff; color: #000; display: none; }

    #results-panel { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.95); border: 3px solid #FFD700; border-radius: 15px; 
      padding: 30px; display: none; z-index: 400; width: 85%; text-align: center; 
    }
    #series-counter { position: absolute; bottom: 30px; width: 100%; text-align: center; font-weight: bold; color: #FFD700; text-shadow: 2px 2px 4px #000; }
    #input_video { display: none; }
  </style>
</head>
<body>

  <div id="top-controls">
    <div class="btn-row">
        <div id="status-display">SISTEMA LISTO</div>
        <div id="arm-selector">
            <div id="btn-left" class="arm-btn" onclick="selectArm('L')">IZQ</div>
            <div id="btn-right" class="arm-btn active" onclick="selectArm('R')">DER</div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btn-camera" class="action-btn btn-camera" onclick="activarCamara()">1. CONECTAR CÁMARA</button>
        <button id="btn-start-serie" class="action-btn btn-start" onclick="iniciarSerie()">2. INICIAR 10 GOLPES</button>
    </div>
  </div>
  
  <div id="main-view">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="debug-info">CALIBRANDO...</div>
    
    <div id="results-panel">
      <h2 style="color:#FFD700; margin:0;">RESULTADOS DE SERIE</h2>
      <div id="stats-content"></div>
      <button class="action-btn btn-camera" onclick="location.reload()" style="width:100%; margin-top:20px;">REPETIR SESIÓN</button>
    </div>
  </div>

  <div id="series-counter">PROGRESO: 0 / 10</div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');
    const debugText = document.getElementById('debug-info');
    const counterText = document.getElementById('series-counter');

    let modo = "OFF"; 
    let selectedArm = "R";
    let t_inicio = 0;
    let registros = [];

    // Configuración de Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.value = 880; // Tono agudo y claro
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    function selectArm(side) {
      selectedArm = side;
      document.getElementById('btn-left').classList.toggle('active', side === 'L');
      document.getElementById('btn-right').classList.toggle('active', side === 'R');
    }

    function calcAng(p1, p2, p3) {
      if(!p1 || !p2 || !p3) return 0;
      let angle = (Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x)) * 180 / Math.PI;
      angle = Math.abs(angle);
      if (angle > 180) angle = 360 - angle;
      return angle;
    }

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (res.poseLandmarks) {
        const landmarks = res.poseLandmarks;
        let cAngle = 0;
        let points = [];

        if (selectedArm === 'R') {
            cAngle = calcAng(landmarks[12], landmarks[14], landmarks[16]);
            points = [12, 14, 16];
        } else {
            cAngle = calcAng(landmarks[11], landmarks[13], landmarks[15]);
            points = [11, 13, 15];
        }

        // Dibujar Conectores y Nodos
        const colorMain = selectedArm === 'R' ? '#FFD700' : '#00E5FF';
        
        // Dibujamos líneas manualmente para asegurar visibilidad
        canvasCtx.beginPath();
        canvasCtx.moveTo(landmarks[points[0]].x * canvasElement.width, landmarks[points[0]].y * canvasElement.height);
        canvasCtx.lineTo(landmarks[points[1]].x * canvasElement.width, landmarks[points[1]].y * canvasElement.height);
        canvasCtx.lineTo(landmarks[points[2]].x * canvasElement.width, landmarks[points[2]].y * canvasElement.height);
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 4;
        canvasCtx.stroke();

        drawLandmarks(canvasCtx, [landmarks[points[0]], landmarks[points[1]], landmarks[points[2]]], {color: colorMain, lineWidth: 2});
        
        debugText.innerText = `ÁNGULO ACTUAL: ${Math.round(cAngle)}°`;

        if (modo === "ATAQUE") {
          const t_actual = performance.now();
          const lapso = t_actual - t_inicio;
          if (cAngle > 165 && lapso > 100) { // Subí a 165 para mayor exigencia técnica
            marcarHit(lapso);
          }
        }
      }
      canvasCtx.restore();
    });

    function marcarHit(tiempo) {
      modo = "PAUSA";
      const segs = tiempo / 1000;
      registros.push(segs);
      statusText.innerText = `¡EXCELENTE! ${segs.toFixed(3)}s`;
      statusText.style.background = "#FFD700";
      statusText.style.color = "#000";
      counterText.innerText = `PROGRESO: ${registros.length} / 10`;

      if (registros.length < 10) {
        setTimeout(esperaAleatoria, 2500);
      } else {
        mostrarResultados();
      }
    }

    function mostrarResultados() {
      modo = "FIN";
      const avg = (registros.reduce((a, b) => a + b, 0) / 10).toFixed(3);
      const min = Math.min(...registros).toFixed(3);
      const max = Math.max(...registros).toFixed(3);
      
      document.getElementById('stats-content').innerHTML = `
        <h1 style="color:#FFD700; font-size:60px; margin:10px 0;">${avg}s</h1>
        <p style="letter-spacing:2px;">PROMEDIO DE REACCIÓN</p>
        <div style="display:flex; justify-content:space-around; margin-top:20px; font-size:18px;">
            <div style="color:#0f0">MIN: ${min}s</div>
            <div style="color:#f00">MAX: ${max}s</div>
        </div>
      `;
      document.getElementById('results-panel').style.display = "block";
      statusText.innerText = "SESIÓN COMPLETADA";
    }

    function esperaAleatoria() {
      modo = "ESPERA";
      statusText.innerText = "¡EN GUARDIA!";
      statusText.style.background = "rgba(0,0,0,0.8)";
      statusText.style.color = "#FFD700";
      
      const randomTime = Math.random() * 3000 + 2000;
      setTimeout(() => {
        if(modo === "ESPERA") {
            modo = "ATAQUE";
            t_inicio = performance.now();
            playBeep(); // ESTÍMULO AUDITIVO
            statusText.innerText = "¡GOLPEA!";
            statusText.style.background = "#FF0000";
            statusText.style.color = "#fff";
        }
      }, randomTime);
    }

    async function activarCamara() {
      const cam = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
      });
      await cam.start();
      document.getElementById('btn-camera').style.display = "none";
      document.getElementById('btn-start-serie').style.display = "block";
      statusText.innerText = "CÁMARA OK";
    }

    function iniciarSerie() {
      registros = [];
      document.getElementById('results-panel').style.display = "none";
      // Activamos el contexto de audio (necesario por seguridad del navegador)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      esperaAleatoria();
    }
  </script>
</body>
</html>
