<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senshi-React AI - Calibración Total</title>
  
  <!-- LIBRERÍAS DE IA -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { 
      margin: 0; 
      background: #000; 
      color: white; 
      font-family: 'Arial', sans-serif; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      overflow: hidden;
    }

    #status { 
      padding: 20px; 
      background: #222; 
      font-size: 22px; 
      font-weight: bold; 
      border-bottom: 4px solid #FFD700; 
      text-align: center;
      min-height: 30px;
    }

    #container { 
      position: relative; 
      flex-grow: 1; 
      background: #111; 
    }

    #input_video { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
      opacity: 0; 
    }

    #output_canvas { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
    }
    
    .controls { 
      padding: 25px; 
      background: #000;
      display: flex; 
      flex-direction: column; 
      gap: 12px;
    }

    button { 
      width: 100%;
      padding: 20px; 
      font-size: 18px; 
      font-weight: bold; 
      border: none; 
      border-radius: 12px; 
      text-transform: uppercase;
      cursor: pointer;
    }

    #btn_start { background: #FFD700; color: #000; }
    #btn_entrenar { background: #FFF; color: #000; display: none; }
  </style>
</head>
<body>

  <div id="status">SISTEMA LISTO</div>
  
  <div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="btn_start">1. ACTIVAR CÁMARA</button>
    <button id="btn_entrenar">2. INICIAR ENTRENAMIENTO</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    const btnStart = document.getElementById('btn_start');
    const btnEntrenar = document.getElementById('btn_entrenar');

    // VARIABLES DE CONTROL
    let etapa = "ESPERANDO"; 
    let tiempoEstimulo = 0;
    let tiempoReaccion = 0;
    
    // Variables de posición para detectar movimiento real
    let manoX_inicio = 0;
    let manoY_inicio = 0;

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        
        // Dibujo de esqueleto en color mostaza
        drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, landmarks, {color: '#FFD700', lineWidth: 1});

        const munecaDer = landmarks[16];
        const munecaIzq = landmarks[15];
        const manoActualX = (munecaDer.x + munecaIzq.x) / 2;
        const manoActualY = (munecaDer.y + munecaIzq.y) / 2;

        // FASE PREPARANDO: Guardamos la posición de la guardia
        if (etapa === "PREPARANDO") {
          manoX_inicio = manoActualX;
          manoY_inicio = manoActualY;
        }

        // FASE ESTIMULO: Buscamos el movimiento explosivo
        if (etapa === "ESTIMULO") {
          const ahora = performance.now();
          const tiempoTranscurrido = ahora - tiempoEstimulo;

          // Calculamos cuánto se ha movido la mano desde la guardia (en % de pantalla)
          const distancia = Math.sqrt(
            Math.pow(manoActualX - manoX_inicio, 2) + 
            Math.pow(manoActualY - manoY_inicio, 2)
          );

          // UMBRAL DE MOVIMIENTO: 0.20 (20% de la pantalla)
          // UMBRAL DE TIEMPO: 200ms (evita falsos positivos inmediatos)
          if (distancia > 0.12 && tiempoTranscurrido > 200) {
            tiempoReaccion = tiempoTranscurrido;
            finalizarGolpe();
          }
        }
      }
      canvasCtx.restore();
    });

    function lanzarEstimulo() {
      etapa = "ESTIMULO";
      tiempoEstimulo = performance.now();
      statusDiv.innerText = "¡GOLPEA!";
      statusDiv.style.background = "#FF0000"; 
      statusDiv.style.color = "white";
    }

    function finalizarGolpe() {
      etapa = "GOLPE";
      const segs = (tiempoReaccion / 1000).toFixed(3);
      statusDiv.innerText = `REACCIÓN: ${segs}s`;
      statusDiv.style.background = "#FFD700"; 
      statusDiv.style.color = "black";
    }

    function prepararSiguiente() {
      etapa = "PREPARANDO";
      statusDiv.innerText = "¡EN GUARDIA! NO TE MUEVAS";
      statusDiv.style.background = "#222";
      statusDiv.style.color = "white";
      
      const espera = Math.floor(Math.random() * 3000) + 2000;
      setTimeout(() => {
        if(etapa === "PREPARANDO") lanzarEstimulo();
      }, espera);
    }

    // BOTONES CON EVENT LISTENERS (Más estables en Android)
    btnStart.addEventListener('click', async () => {
      statusDiv.innerText = "CARGANDO IA...";
      try {
        const camera = new Camera(videoElement, {
          onFrame: async () => { await pose.send({image: videoElement}); },
          width: 640, height: 480
        });
        await camera.start();
        btnStart.style.display = "none";
        btnEntrenar.style.display = "block"; 
        statusDiv.innerText = "SISTEMA LISTO";
      } catch (e) {
        statusDiv.innerText = "ERROR AL ACTIVAR CÁMARA";
      }
    });

    btnEntrenar.addEventListener('click', () => {
      prepararSiguiente();
    });

  </script>
</body>
</html>
