<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-React AI v3.5 - Gráficos de Rendimiento</title>
  
  <!-- Librerías de IA y Gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #top-controls { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .btn-row { display: flex; gap: 8px; }
    
    #status-display { background: rgba(30,30,30,0.95); padding: 12px; border-radius: 10px; border: 3px solid #FFD700; font-size: 18px; font-weight: bold; text-align: center; flex-grow: 2; }
    
    .config-box { background: rgba(0,0,0,0.85); padding: 10px; border-radius: 10px; border: 1px solid #FFD700; display: flex; justify-content: space-between; align-items: center; }
    input[type="number"] { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #FFD700; background: #000; color: #FFD700; font-weight: bold; text-align: center; }

    #main-view { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    #output_canvas { max-width: 100%; max-height: 100%; }
    
    button.action-btn { padding: 15px; font-size: 13px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase; cursor: pointer; flex: 1; }
    .btn-camera { background: #FFD700; color: #000; }
    .btn-start { background: #fff; color: #000; display: none; }

    /* Panel de Resultados Expandido */
    #results-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 500; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    .chart-container { background: #111; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px solid #333; height: 250px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-card { background: #1a1a1a; padding: 10px; border-radius: 8px; border-left: 4px solid #FFD700; font-size: 12px; }
  </style>
</head>
<body>

  <div id="top-controls">
    <div class="btn-row">
        <div id="status-display">ANALIZADOR GRAFICO</div>
    </div>
    <div class="config-box">
        <span style="font-size: 11px; font-weight:bold; color:#FFD700;">ANTEBRAZO (CM):</span>
        <input type="number" id="antebrazo-cm" value="25">
        <button id="btn-camera" class="action-btn btn-camera" onclick="activarCamara()">1. CONECTAR</button>
    </div>
    <button id="btn-start-serie" class="action-btn btn-start" onclick="iniciarSerie()">2. COMENZAR TEST</button>
  </div>
  
  <div id="main-view">
    <video id="input_video" style="display:none" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="results-panel">
      <h2 style="color:#FFD700; text-align:center; margin-bottom:5px;">REPORTE FINAL</h2>
      <p id="res-resumen" style="text-align:center; margin-top:0; color:#aaa;"></p>
      
      <div class="chart-container">
        <canvas id="performanceChart"></canvas>
      </div>

      <div id="stats-list" class="stat-grid"></div>
      
      <button class="action-btn btn-camera" onclick="location.reload()" style="width:100%;">NUEVA SESIÓN</button>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');
    let registros = [];
    let modo = "OFF";
    let myChart = null;

    // Lógica de MediaPipe y Biomecánica (Igual a la v3.2 anterior)
    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    // ... (Variables de tiempo y posición iguales a la versión anterior)
    let t_inicio, currentWrist, posInicialPuño, pxPorCm, buscandoPico;

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      if (res.poseLandmarks) {
        const lm = res.poseLandmarks;
        const codo = lm[14]; const muñeca = lm[16]; const hombro = lm[12];
        currentWrist = {x: muñeca.x, y: muñeca.y};
        pxPorCm = Math.hypot((muñeca.x - codo.x) * canvasElement.width, (muñeca.y - codo.y) * canvasElement.height) / parseFloat(document.getElementById('antebrazo-cm').value);
        
        let ang = (Math.atan2(muñeca.y - codo.y, muñeca.x - codo.x) - Math.atan2(hombro.y - codo.y, hombro.x - codo.x)) * 180 / Math.PI;
        ang = Math.abs(ang); if (ang > 180) ang = 360 - ang;

        if (modo === "ATAQUE") {
          if (!buscandoPico && ang > 160) { buscandoPico = true; }
          if (buscandoPico) {
             if (ang >= 170) { /* sigue extendiendo */ } 
             else { finalizarGolpe(ang, muñeca); }
          }
        }
      }
    });

    function finalizarGolpe(maxExt, posFinal) {
      const dur = (performance.now() - t_inicio) / 1000;
      const dPx = Math.hypot((posFinal.x - posInicialPuño.x)*canvasElement.width, (posFinal.y - posInicialPuño.y)*canvasElement.height);
      const dCm = dPx / pxPorCm;
      const vMs = (dCm/100)/dur;
      
      buscandoPico = false; modo = "PAUSA";
      registros.push({ tiempo: dur, velocidad: vMs, distancia: dCm });
      
      // Aplicar semáforo del Sensei
      if(dur < 0.75) statusText.style.background = "#28a745";
      else if(dur <= 0.99) statusText.style.background = "#ffc107";
      else statusText.style.background = "#dc3545";
      statusText.innerText = `${dur.toFixed(3)}s | ${vMs.toFixed(2)} m/s`;

      if (registros.length < 10) setTimeout(esperaAleatoria, 2000);
      else generarGrafica();
    }

    function generarGrafica() {
      modo = "FIN";
      document.getElementById('results-panel').style.display = "block";
      
      const etiquetas = registros.map((_, i) => `G${i+1}`);
      const datosTiempo = registros.map(r => r.tiempo);
      const datosVelocidad = registros.map(r => r.velocidad);

      const ctx = document.getElementById('performanceChart').getContext('2d');
      if (myChart) myChart.destroy();

      myChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: etiquetas,
          datasets: [
            {
              label: 'Velocidad (m/s)',
              data: datosVelocidad,
              borderColor: '#FFD700',
              backgroundColor: 'rgba(255, 215, 0, 0.2)',
              yAxisID: 'yVel',
              tension: 0.4
            },
            {
              label: 'Reacción (s)',
              data: datosTiempo,
              borderColor: '#fff',
              borderDash: [5, 5],
              yAxisID: 'yTime',
              tension: 0.1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            yVel: { type: 'linear', position: 'left', title: { display: true, text: 'm/s', color: '#FFD700' } },
            yTime: { type: 'linear', position: 'right', title: { display: true, text: 'Segundos' }, grid: { drawOnChartArea: false } }
          },
          plugins: { legend: { labels: { color: '#fff', boxWidth: 12 } } }
        }
      });

      // Llenar lista de stats
      let html = "";
      registros.forEach((r, i) => {
        html += `<div class="stat-card"><b>#${i+1}</b>: ${r.tiempo.toFixed(3)}s<br><span style="color:#FFD700">${r.velocidad.toFixed(2)} m/s</span></div>`;
      });
      document.getElementById('stats-list').innerHTML = html;
    }

    // ... (Funciones auxiliares activarCamara, iniciarSerie y esperaAleatoria iguales)
    async function activarCamara() { 
        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start(); 
        document.getElementById('btn-camera').style.display="none"; 
        document.getElementById('btn-start-serie').style.display="block"; 
    }
    function iniciarSerie() { registros = []; document.getElementById('results-panel').style.display="none"; esperaAleatoria(); }
    function esperaAleatoria() {
      modo = "ESPERA"; statusText.innerText = "¡LISTO!"; statusText.style.background = "#1a1a1a";
      setTimeout(() => {
        if(modo === "ESPERA") {
          posInicialPuño = {x: currentWrist.x, y: currentWrist.y};
          modo = "ATAQUE"; t_inicio = performance.now();
          // Sonido buzzer...
          statusText.innerText = "¡YA!"; statusText.style.background = "#f00";
        }
      }, Math.random() * 3000 + 2000);
    }
  </script>
</body>
</html>
