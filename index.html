<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senshi-React AI</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    /* Estilos optimizados para que nada se oculte */
    body { 
      margin: 0; 
      background: #000; 
      color: white; 
      font-family: sans-serif; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }

    #status { 
      padding: 15px; 
      background: #222; 
      font-size: 20px; 
      font-weight: bold; 
      border-bottom: 4px solid #FFD700; /* Color Mostaza */
      text-align: center;
    }

    #container { 
      position: relative; 
      flex-grow: 1; /* Esto hace que la cámara use el espacio disponible */
      background: #111; 
      overflow: hidden;
    }

    #input_video { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
      opacity: 0; 
    }

    #output_canvas { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
    }
    
    /* Contenedor de botones fijo abajo */
    .controls { 
      padding: 20px; 
      background: #000;
      display: flex; 
      flex-direction: column; 
      gap: 10px;
    }

    button { 
      width: 100%;
      padding: 20px; 
      font-size: 18px; 
      font-weight: bold; 
      border: none; 
      border-radius: 10px; 
      text-transform: uppercase;
    }

    #btn_start { 
      background: #FFD700; /* Mostaza */
      color: #000; 
    }

    #btn_entrenar { 
      background: #FFF; 
      color: #000; 
      display: none; /* Se activa después de la cámara */
    }
  </style>
</head>
<body>

  <div id="status">SISTEMA LISTO</div>
  
  <div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="btn_start">1. ACTIVAR CÁMARA</button>
    <button id="btn_entrenar">2. INICIAR ENTRENAMIENTO</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    const btnStart = document.getElementById('btn_start');
    const btnEntrenar = document.getElementById('btn_entrenar');

    let etapa = "ESPERANDO"; 
    let tiempoEstimulo = 0;
    let tiempoReaccion = 0;

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, landmarks, {color: '#FFD700', lineWidth: 1});

        if (etapa === "ESTIMULO") {
          // Detectamos muñecas (puntos 15 y 16)
          const zDer = landmarks[16].z; 
          const zIzq = landmarks[15].z;

          // Sensibilidad ajustada: si el puño se acerca a la cámara
          if (zDer < -0.12 || zIzq < -0.12) {
            tiempoReaccion = performance.now() - tiempoEstimulo;
            finalizarGolpe();
          }
        }
      }
      canvasCtx.restore();
    });

    function lanzarEstimulo() {
      etapa = "ESTIMULO";
      tiempoEstimulo = performance.now();
      statusDiv.innerText = "¡GOLPEA!";
      statusDiv.style.background = "#FF0000"; 
      statusDiv.style.color = "white";
    }

    function finalizarGolpe() {
      etapa = "GOLPE";
      const segs = (tiempoReaccion / 1000).toFixed(3);
      statusDiv.innerText = `REACCIÓN: ${segs}s`;
      statusDiv.style.background = "#FFD700"; 
      statusDiv.style.color = "black";
    }

    function prepararSiguiente() {
      etapa = "ESPERANDO";
      statusDiv.innerText = "¡EN GUARDIA!";
      statusDiv.style.background = "#222";
      statusDiv.style.color = "white";
      
      const espera = Math.floor(Math.random() * 2000) + 2000;
      setTimeout(() => {
        if(etapa === "ESPERANDO") lanzarEstimulo();
      }, espera);
    }

    btnStart.onclick = async () => {
      statusDiv.innerText = "SOLICITANDO CÁMARA...";
      try {
        const camera = new Camera(videoElement, {
          onFrame: async () => { await pose.send({image: videoElement}); },
          width: 640, height: 480
        });
        await camera.start();
        btnStart.style.display = "none";
        btnEntrenar.style.display = "block"; // Aquí forzamos que aparezca el botón 2
        statusDiv.innerText = "SISTEMA LISTO";
      } catch (e) {
        statusDiv.innerText = "ERROR DE CÁMARA";
      }
    };

    btnEntrenar.onclick = () => {
      prepararSiguiente();
    };
  </script>
</body>
</html>
