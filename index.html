<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-React AI - Selector de Brazo</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #header-app { padding: 10px; background: #111; border-bottom: 2px solid #FFD700; display: flex; justify-content: space-between; align-items: center; }
    #status-display { font-size: 18px; font-weight: bold; flex-grow: 1; text-align: center; }
    #main-view { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; }
    #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
    
    /* Selector de Brazo */
    #arm-selector {
      position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; z-index: 150;
    }
    .arm-btn {
      padding: 8px 15px; border: 1px solid #FFD700; background: #222; color: #FFD700; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer;
    }
    .arm-btn.active { background: #FFD700; color: #000; }

    #debug-info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px; font-family: monospace; font-size: 12px; color: #0f0; pointer-events: none; }
    #results-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 3px solid #FFD700; border-radius: 15px; padding: 25px; display: none; z-index: 200; width: 80%; text-align: center; }
    #footer-controls { padding: 15px; background: #111; display: flex; flex-direction: column; gap: 8px; }
    button { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase; }
    .btn-main { background: #FFD700; color: #000; }
    .btn-action { background: #fff; color: #000; display: none; }
    #series-counter { text-align: center; color: #FFD700; font-size: 14px; }
    #input_video { display: none; }
  </style>
</head>
<body>

  <div id="header-app">
    <div id="status-display">CONFIGURAR ENTRENAMIENTO</div>
  </div>
  
  <div id="main-view">
    <div id="arm-selector">
      <div id="btn-left" class="arm-btn" onclick="selectArm('L')">BRAZO IZQ</div>
      <div id="btn-right" class="arm-btn active" onclick="selectArm('R')">BRAZO DER</div>
    </div>

    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="debug-info">ANGULO: --</div>
    
    <div id="results-panel">
      <h2 style="color:#FFD700;">SERIE FINALIZADA</h2>
      <div id="stats-content"></div>
      <button class="btn-main" onclick="location.reload()" style="width:100%; margin-top:15px;">NUEVA SESIÓN</button>
    </div>
  </div>

  <div id="footer-controls">
    <div id="series-counter">LISTO</div>
    <button id="btn-camera" class="btn-main" onclick="activarCamara()">1. ENCENDER CÁMARA</button>
    <button id="btn-start-serie" class="btn-action" onclick="iniciarSerie()">2. INICIAR 10 GOLPES</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');
    const debugText = document.getElementById('debug-info');
    const counterText = document.getElementById('series-counter');

    let modo = "OFF"; 
    let selectedArm = "R"; // Por defecto Derecho
    let t_inicio = 0;
    let registros = [];

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    function selectArm(side) {
      selectedArm = side;
      document.getElementById('btn-left').classList.toggle('active', side === 'L');
      document.getElementById('btn-right').classList.toggle('active', side === 'R');
    }

    function calcAng(p1, p2, p3) {
      if(!p1 || !p2 || !p3) return 0;
      let angle = (Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x)) * 180 / Math.PI;
      angle = Math.abs(angle);
      if (angle > 180) angle = 360 - angle;
      return angle;
    }

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (res.poseLandmarks) {
        // Solo dibujamos el brazo seleccionado para evitar distracciones
        const landmarks = res.poseLandmarks;
        const colorTrack = selectedArm === 'R' ? '#FFD700' : '#00E5FF';
        
        let currentAngle = 0;
        if (selectedArm === 'R') {
            currentAngle = calcAng(landmarks[12], landmarks[14], landmarks[16]);
            drawLandmarks(canvasCtx, [landmarks[12], landmarks[14], landmarks[16]], {color: colorTrack, lineWidth: 2});
        } else {
            currentAngle = calcAng(landmarks[11], landmarks[13], landmarks[15]);
            drawLandmarks(canvasCtx, [landmarks[11], landmarks[13], landmarks[15]], {color: colorTrack, lineWidth: 2});
        }
        
        debugText.innerText = `BRAZO ${selectedArm === 'R' ? 'DER' : 'IZQ'}: ${Math.round(currentAngle)}° | MODO: ${modo}`;

        if (modo === "ATAQUE") {
          const t_actual = performance.now();
          const lapso = t_actual - t_inicio;
          
          // Mantenemos 160° como base de éxito tras tu prueba anterior
          if (currentAngle > 160 && lapso > 100) {
            marcarHit(lapso);
          }
        }
      }
      canvasCtx.restore();
    });

    function marcarHit(tiempo) {
      modo = "PAUSA";
      const segs = tiempo / 1000;
      registros.push(segs);
      statusText.innerText = `¡GOLPE! ${segs.toFixed(3)}s`;
      counterText.innerText = `GOLPES: ${registros.length} / 10`;

      if (registros.length < 10) {
        setTimeout(esperaAleatoria, 2000);
      } else {
        mostrarResultados();
      }
    }

    function mostrarResultados() {
      modo = "FIN";
      const avg = (registros.reduce((a, b) => a + b, 0) / 10).toFixed(3);
      const min = Math.min(...registros).toFixed(3);
      const max = Math.max(...registros).toFixed(3);
      
      document.getElementById('stats-content').innerHTML = `
        <h1 style="color:#FFD700; font-size:48px; margin:10px 0;">${avg}s</h1>
        <p style="color:#888;">PROMEDIO DE REACCIÓN</p>
        <div style="display:flex; justify-content:space-around; margin-top:20px; font-weight:bold;">
            <div>MIN: ${min}s</div>
            <div>MAX: ${max}s</div>
        </div>
      `;
      document.getElementById('results-panel').style.display = "block";
      statusText.innerText = "SESIÓN COMPLETADA";
    }

    function esperaAleatoria() {
      modo = "ESPERA";
      statusText.innerText = "¡EN GUARDIA!";
      statusText.style.background = "#111";
      statusText.style.color = "#FFD700";
      
      setTimeout(() => {
        if(modo === "ESPERA") {
            modo = "ATAQUE";
            t_inicio = performance.now();
            statusText.innerText = "¡GOLPEA!";
            statusText.style.background = "#FF0000";
            statusText.style.color = "#fff";
        }
      }, Math.random() * 3000 + 2000);
    }

    async function activarCamara() {
      const cam = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
      });
      await cam.start();
      document.getElementById('btn-camera').style.display = "none";
      document.getElementById('btn-start-serie').style.display = "block";
      statusText.innerText = "CÁMARA CONECTADA";
    }

    function iniciarSerie() {
      registros = [];
      document.getElementById('results-panel').style.display = "none";
      esperaAleatoria();
    }
  </script>
</body>
</html>
