<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-Form AI v7.5 - On-Demand AI Analyzer</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #top-controls { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 300; display: flex; flex-direction: column; gap: 6px; }
    .btn-row { display: flex; gap: 6px; }
    #status-display { background: rgba(30,30,30,0.95); padding: 12px; border-radius: 10px; border: 3px solid #FFD700; font-size: 15px; font-weight: bold; text-align: center; flex-grow: 2; text-transform: uppercase; }
    .selector-group { display: flex; flex-direction: column; gap: 3px; background: rgba(0,0,0,0.8); padding: 4px; border-radius: 8px; border: 1px solid #444; }
    .opt-btn { padding: 4px 8px; border: 1px solid #FFD700; background: #222; color: #FFD700; border-radius: 5px; font-size: 9px; font-weight: bold; cursor: pointer; text-align: center; white-space: nowrap; }
    .opt-btn.active { background: #FFD700; color: #000; }
    .config-box { background: rgba(0,0,0,0.85); padding: 6px; border-radius: 10px; border: 1px solid #FFD700; display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center; gap: 5px; }
    .input-field { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: bold; color: #FFD700; }
    input { padding: 4px; border-radius: 4px; border: 1px solid #FFD700; background: #000; color: #FFD700; text-align: center; }
    #atleta-nombre { width: 110px; text-align: left; }
    #main-view { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #output_canvas { max-width: 100%; max-height: 100%; }
    .mirror { transform: scaleX(-1); }
    button.action-btn { padding: 12px; font-size: 12px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase; cursor: pointer; flex: 1; }
    .btn-camera { background: #FFD700; color: #000; }
    .btn-start { background: #fff; color: #000; display: none; }
    
    #results-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 500; overflow-y: auto; padding: 15px; box-sizing: border-box; border-top: 5px solid #FFD700; }
    .tabs-row { display: flex; gap: 5px; margin: 10px 0 5px 0; }
    .tab-btn { flex: 1; padding: 10px; background: #222; color: #aaa; border: 1px solid #444; font-weight: bold; font-size: 11px; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    .tab-btn.active { background: #FFD700; color: #000; border-color: #FFD700; }
    .chart-container { background: #111; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #333; height: 190px; }
    .stat-grid { display: grid; grid-template-columns: 1fr; gap: 4px; margin-bottom: 15px; }
    .stat-card { background: #1a1a1a; padding: 8px; border-radius: 8px; border-left: 4px solid #FFD700; font-size: 9px; display: grid; align-items: center; text-align: center; }
    
    .grid-sup { grid-template-columns: 0.4fr 1fr 1fr 1fr 1fr 1.2fr; }
    .grid-inf { grid-template-columns: 0.4fr 1fr 1fr 1.2fr 1fr 1fr; }
    
    /* AI Box Redesign */
    .ai-box { background: #0f172a; border: 2px solid #3b82f6; border-radius: 12px; padding: 15px; margin: 15px 0; font-size: 12px; line-height: 1.5; color: #e2e8f0; position: relative; }
    .ai-header { color: #3b82f6; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ai-title-group { display: flex; align-items: center; gap: 6px; }
    .ai-loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .btn-ai-trigger { background: #3b82f6; color: white; border: none; padding: 6px 12px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 10px; }
    .btn-ai-trigger:hover { background: #2563eb; }
    .ai-config-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 6px; }

    .best-hit { background: #064e3b !important; border-left: 4px solid #10b981 !important; }
    .worst-hit { background: #7f1d1d !important; border-left: 4px solid #ef4444 !important; }
    #input_video { display: none; }
    .util-btn { padding: 10px; background: #0284c7; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; margin-bottom: 8px; width: 100%; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="top-controls">
    <div class="btn-row">
        <div id="status-display">SENSHI-FORM V7.5</div>
        <div class="selector-group">
            <div id="btn-mode-vel" class="opt-btn active" onclick="switchModoEvaluacion('VELOCIDAD')">M. VELOCIDAD</div>
            <div id="btn-mode-bio" class="opt-btn" onclick="switchModoEvaluacion('BIOMECANICO')">M. BIOMECÁNICO</div>
        </div>
        <div class="selector-group">
            <div id="btn-cam-front" class="opt-btn active" onclick="switchCam('user')">FRONT</div>
            <div id="btn-cam-back" class="opt-btn" onclick="switchCam('environment')">BACK</div>
        </div>
        <div class="selector-group">
            <div id="btn-left" class="opt-btn" onclick="selectArm('L')">IZQ</div>
            <div id="btn-right" class="opt-btn active" onclick="selectArm('R')">DER</div>
        </div>
    </div>
    <div class="config-box">
        <div class="input-field">ALUMNO: <input type="text" id="atleta-nombre" value="KARATEKA"></div>
        <div class="input-field">BRAZO(CM): <input type="number" id="antebrazo-cm" style="width:32px;" value="25"></div>
        <div class="input-field">PESO(KG): <input type="number" id="peso-kg" style="width:35px;" value="86"></div>
        <button id="btn-camera" class="action-btn btn-camera" style="max-width: 85px; padding: 5px;" onclick="activarCamara()">1. CONECTAR</button>
    </div>
    <button id="btn-start-serie" class="action-btn btn-start" onclick="prepararAtleta()">2. INICIAR EVALUACIÓN</button>
  </div>
  
  <div id="main-view">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas" class="mirror"></canvas>
    
    <div id="results-panel">
      <h3 id="report-title" style="color:#FFD700; text-align:center; margin:0; font-size:14px;">REPORTE DE RENDIMIENTO V7.5</h3>
      <div id="res-promedios" style="text-align:center; font-size:11px; margin:4px 0; color:#ddd;"></div>
      
      <!-- AI Interpretation Box (On-Demand) -->
      <div class="ai-box">
        <div class="ai-header">
            <div class="ai-title-group">
                <span id="ai-icon">🤖</span> 
                <span>INTERPRETACIÓN SENSEI-AI</span>
                <div id="ai-loading-spinner" class="ai-loader" style="display:none;"></div>
            </div>
            <button id="btn-run-ai" class="btn-ai-trigger" onclick="generarInterpretacionAI()">Analizar con IA</button>
        </div>
        
        <div class="ai-config-row">
            <label style="font-size: 10px; color:#3b82f6; font-weight:bold;">API KEY:</label>
            <input type="password" id="ai-api-key" placeholder="Introduce tu OpenAI Key" style="flex-grow:1; font-size:10px; padding:2px; text-align:left; border-color:#3b82f6;">
        </div>

        <div id="ai-interpretation-text">Haz clic en el botón "Analizar con IA" superior para procesar los datos de la serie actual de forma remota.</div>
      </div>

      <div class="tabs-row" id="container-tabs" style="display:none;">
         <button id="tab-sup" class="tab-btn active" onclick="cambiarPestaña('SUPERIOR')">Tren Superior / Tiempos</button>
         <button id="tab-inf" class="tab-btn" onclick="cambiarPestaña('INFERIOR')">Tren Inferior / Biomecánica</button>
      </div>

      <div class="chart-container"><canvas id="performanceChart"></canvas></div>
      <button id="btn-copy" class="util-btn" onclick="copiarDatosPortapapeles()">Copiar Reporte Completo</button>

      <div id="table-header" style="font-size: 8px; color: #FFD700; display: grid; text-align: center; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;"></div>
      <div id="stats-list" class="stat-grid"></div>
      <button class="action-btn btn-camera" onclick="location.reload()" style="width:100%; padding:10px;">NUEVA SESIÓN</button>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');

    let modo = "OFF", evalMode = "VELOCIDAD", currentTab = "SUPERIOR", selectedArm = "R", facingMode = "user", registros = [], myChart = null;
    let pxPorCm = 0, posInicialPuño = null, buscandoPico = false, picoMaximo = 0, t_inicio = 0, t_pico = 0;
    let picoPos = null, buscandoPicoRetorno = false, minAnguloRetorno = 180;
    let currentLandmarks = null;

    let calibracionBuzzer = { pieApoyoX: 0, pieAtaqueX: 0, rodillaY: 0, distCaderaBase: 1, distHombroBase: 1 };

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    }

    function playAudio(freq, dur, type="sawtooth") {
        initAudio(); if(!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.7, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    // New Cloud AI Integration (OpenAI API standard structure)
    async function generarInterpretacionAI() {
        const apiKey = document.getElementById('ai-api-key').value.trim();
        if(!apiKey) {
            document.getElementById('ai-interpretation-text').innerText = "⚠️ Por favor, ingresa una API Key válida en el recuadro azul para proceder.";
            return;
        }

        if(registros.length === 0) {
            document.getElementById('ai-interpretation-text').innerText = "⚠️ No hay datos registrados en esta sesión para analizar.";
            return;
        }

        document.getElementById('ai-loading-spinner').style.display = "inline-block";
        document.getElementById('ai-interpretation-text').innerText = "Enviando telemetría al servidor de IA...";
        
        const dataSummary = registros.map((r,i) => `G${i+1}: Atq ${r.kmh.toFixed(1)}km/h, Ret ${r.vRetorno.toFixed(1)}km/h, Reacción ${r.tiempo.toFixed(3)}s, Fuerza ${r.fuerza.toFixed(1)}kg, RotCadera ${r.bio.rotCadera.toFixed(0)}°, BajaRodilla ${r.bio.bajaRodilla.toFixed(0)}cm`).join('\n');
        
        const prompt = `Eres un Sensei experto en biomecánica de Karate. Analiza la siguiente serie de 10 golpes (Gyaku Zuki) y da un consejo técnico directo y sumamente breve (máximo 4 líneas) en español enfocado en optimizar la relación ataque-retorno (Hikite) e inercia corporal usando estos datos de telemetría:\n${dataSummary}`;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // Cambiar por el modelo deseado (ej. gpt-4o, gpt-3.5-turbo, etc.)
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if(data.choices && data.choices[0]) {
                document.getElementById('ai-interpretation-text').innerText = data.choices[0].message.content;
            } else if (data.error) {
                document.getElementById('ai-interpretation-text').innerText = `Error de API: ${data.error.message}`;
            } else {
                document.getElementById('ai-interpretation-text').innerText = "Error inesperado al procesar la respuesta.";
            }
        } catch (e) {
            document.getElementById('ai-interpretation-text').innerText = "Error de red. Asegúrate de tener conexión a internet estable.";
            console.error(e);
        } finally {
            document.getElementById('ai-loading-spinner').style.display = "none";
        }
    }

    function switchModoEvaluacion(mode) {
        initAudio(); if (modo !== "OFF") return;
        evalMode = mode;
        document.getElementById('btn-mode-vel').classList.toggle('active', mode === 'VELOCIDAD');
        document.getElementById('btn-mode-bio').classList.toggle('active', mode === 'BIOMECANICO');
        statusText.innerText = `SENSHI-${mode === 'VELOCIDAD' ? 'REACT' : 'FORM'} V7.5`;
    }

    function switchCam(mode) {
      if (modo !== "OFF") return;
      facingMode = mode;
      document.getElementById('btn-cam-front').classList.toggle('active', mode === 'user');
      document.getElementById('btn-cam-back').classList.toggle('active', mode === 'environment');
      canvasElement.classList.toggle('mirror', mode === 'user');
    }

    function selectArm(side) {
      selectedArm = side;
      document.getElementById('btn-left').classList.toggle('active', side === 'L');
      document.getElementById('btn-right').classList.toggle('active', side === 'R');
    }

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (res.poseLandmarks) {
        currentLandmarks = res.poseLandmarks;
        const lm = currentLandmarks;
        const pArm = (selectedArm === 'R') ? [12, 14, 16] : [11, 13, 15];
        const hombroAtaque = lm[pArm[0]], codoAtaque = lm[pArm[1]], muñecaAtaque = lm[pArm[2]];

        pxPorCm = Math.hypot((muñecaAtaque.x - codoAtaque.x) * canvasElement.width, (muñecaAtaque.y - codoAtaque.y) * canvasElement.height) / parseFloat(document.getElementById('antebrazo-cm').value);
        
        let angArm = Math.abs((Math.atan2(muñecaAtaque.y - codoAtaque.y, muñecaAtaque.x - codoAtaque.x) - Math.atan2(hombroAtaque.y - codoAtaque.y, hombroAtaque.x - codoAtaque.x)) * 180 / Math.PI);
        if (angArm > 180) angArm = 360 - angArm;

        if (evalMode === "VELOCIDAD") {
            canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = "#FFD700";
            canvasCtx.beginPath(); canvasCtx.moveTo(hombroAtaque.x * canvasElement.width, hombroAtaque.y * canvasElement.height);
            canvasCtx.lineTo(codoAtaque.x * canvasElement.width, codoAtaque.y * canvasElement.height);
            canvasCtx.lineTo(muñecaAtaque.x * canvasElement.width, muñecaAtaque.y * canvasElement.height); canvasCtx.stroke();
            drawLandmarks(canvasCtx, [hombroAtaque, codoAtaque, muñecaAtaque], {color: "#00E5FF", lineWidth: 2}); 
        } 
        else if (evalMode === "BIOMECANICO") {
            const nodeColor = (idx) => [11,13,15,23,25,27,29,31].includes(idx) ? "#00E5FF" : "#FFD700";
            const lineColor = (idx1) => [11,13,23,25,27,29].includes(idx1) ? "#00E5FF" : "#FFD700";
            const conexionesBio = [ [23, 25], [24, 26], [25, 27], [26, 28], [27, 31], [28, 32] ];
            conexionesBio.forEach(([i, j]) => {
                canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = lineColor(i);
                canvasCtx.beginPath(); canvasCtx.moveTo(lm[i].x * canvasElement.width, lm[i].y * canvasElement.height);
                canvasCtx.lineTo(lm[j].x * canvasElement.width, lm[j].y * canvasElement.height); canvasCtx.stroke();
            });
            canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = nodeColor(pArm[0]);
            canvasCtx.beginPath(); canvasCtx.moveTo(hombroAtaque.x * canvasElement.width, hombroAtaque.y * canvasElement.height);
            canvasCtx.lineTo(codoAtaque.x * canvasElement.width, codoAtaque.y * canvasElement.height);
            canvasCtx.lineTo(muñecaAtaque.x * canvasElement.width, muñecaAtaque.y * canvasElement.height); canvasCtx.stroke();
            const nodosRequeridos = [11, 12, 23, 24, 25, 26, 31, 32, pArm[1], pArm[2]];
            nodosRequeridos.forEach(idx => {
                canvasCtx.fillStyle = nodeColor(idx); canvasCtx.beginPath();
                canvasCtx.arc(lm[idx].x * canvasElement.width, lm[idx].y * canvasElement.height, 5, 0, 2 * Math.PI); canvasCtx.fill();
            });
        }

        if (modo === "ATAQUE") {
          if (!buscandoPico && angArm > 155) { buscandoPico = true; picoMaximo = angArm; }
          if (buscandoPico) {
            if (angArm >= picoMaximo) { picoMaximo = angArm; } 
            else {
                t_pico = performance.now(); playAudio(1000, 0.12, "sine"); 
                picoPos = { x: muñecaAtaque.x, y: muñecaAtaque.y };
                modo = "RETORNO"; buscandoPico = false; buscandoPicoRetorno = false; minAnguloRetorno = angArm;
            }
          }
        } 
        else if (modo === "RETORNO") {
            if (!buscandoPicoRetorno && angArm < 130) { buscandoPicoRetorno = true; minAnguloRetorno = angArm; }
            if (buscandoPicoRetorno) {
                if (angArm <= minAnguloRetorno) { minAnguloRetorno = angArm; } 
                else { finalizarCicloGolpe(muñecaAtaque); }
            }
            if ((performance.now() - t_pico) > 800) { finalizarCicloGolpe(muñecaAtaque); }
        }
      }
      canvasCtx.restore();
    });

    function finalizarCicloGolpe(posFinal) {
      const t_fin = performance.now();
      const durAtaque = (t_pico - t_inicio) / 1000;
      let durRetorno = (t_fin - t_pico) / 1000;
      if(durRetorno < 0.04) durRetorno = 0.04;

      const dCm = Math.hypot((picoPos.x - posInicialPuño.x) * canvasElement.width, (picoPos.y - posInicialPuño.y) * canvasElement.height) / pxPorCm;
      const vKmh = ((dCm / 100) / durAtaque) * 3.6;
      const dCmRetorno = Math.hypot((posFinal.x - picoPos.x) * canvasElement.width, (posFinal.y - picoPos.y) * canvasElement.height) / pxPorCm;
      const vKmhRetorno = ((dCmRetorno / 100) / durRetorno) * 3.6;
      
      const masaEfectiva = parseFloat(document.getElementById('peso-kg').value) * 0.06; 
      const fuerzaKg = (masaEfectiva * (vKmh/3.6)) / 0.08 / 9.81;

      let bioData = { avancePieApoyo: 0, avancePieAtaque: 0, bajaRodilla: 0, rotCadera: 0, rotHombro: 0 };
      if (currentLandmarks) {
          const lm = currentLandmarks; const esDerecho = (selectedArm === "R");
          bioData.avancePieApoyo = Math.abs(lm[esDerecho ? 31 : 32].x - calibracionBuzzer.pieApoyoX) * canvasElement.width / pxPorCm;
          bioData.avancePieAtaque = Math.abs(lm[esDerecho ? 32 : 31].x - calibracionBuzzer.pieAtaqueX) * canvasElement.width / pxPorCm;
          bioData.bajaRodilla = (lm[esDerecho ? 26 : 25].y - calibracionBuzzer.rodillaY) * canvasElement.height / pxPorCm;
          bioData.rotCadera = Math.acos(Math.min(Math.abs(lm[23].x - lm[24].x) / calibracionBuzzer.distCaderaBase, 1)) * (180 / Math.PI);
          bioData.rotHombro = Math.acos(Math.min(Math.abs(lm[11].x - lm[12].x) / calibracionBuzzer.distHombroBase, 1)) * (180 / Math.PI);
      }

      modo = "PAUSA";
      registros.push({ tiempo: durAtaque, kmh: vKmh, vRetorno: vKmhRetorno, distancia: dCm, fuerza: fuerzaKg, bio: bioData });
      statusText.innerText = `ATQ: ${vKmh.toFixed(1)} | RET: ${vKmhRetorno.toFixed(1)} km/h`;

      if (registros.length < 10) setTimeout(esperaAleatoria, 2500);
      else { playAudio(150, 1.2, "sawtooth"); mostrarResultadosFinales(); }
    }

    function cambiarPestaña(tab) {
        currentTab = tab;
        document.getElementById('tab-sup').classList.toggle('active', tab === 'SUPERIOR');
        document.getElementById('tab-inf').classList.toggle('active', tab === 'INFERIOR');
        renderizarGraficaYTabla();
    }

    function mostrarResultadosFinales() {
      modo = "FIN"; document.getElementById('results-panel').style.display = "block";
      document.getElementById('container-tabs').style.display = (evalMode === "BIOMECANICO") ? "flex" : "none";
      currentTab = "SUPERIOR"; renderizarGraficaYTabla();
      // No se dispara automáticamente la IA para evitar bloqueos involuntarios.
      document.getElementById('ai-interpretation-text').innerText = "Listo. Datos recopilados. Ingresa tu API Key y presiona 'Analizar con IA'.";
    }

    function renderizarGraficaYTabla() {
      const name = document.getElementById('atleta-nombre').value.toUpperCase();
      const avgK = (registros.reduce((a, b) => a + b.kmh, 0) / 10).toFixed(1);
      document.getElementById('res-promedios').innerHTML = `ALUMNO: ${name} | PROMEDIO EN IMPACTO: ${avgK} km/h`;

      let bestIdx = 0, worstIdx = 0, minScore = Infinity, maxScore = -Infinity;
      registros.forEach((r, i) => {
          let score = r.tiempo / (r.kmh + 0.1); 
          if(score < minScore) { minScore = score; bestIdx = i; }
          if(score > maxScore) { maxScore = score; worstIdx = i; }
      });

      const ctx = document.getElementById('performanceChart').getContext('2d');
      if (myChart) myChart.destroy();

      let datasetData = [], opcionesEscala = {};
      if (evalMode === "VELOCIDAD" || currentTab === "SUPERIOR") {
          datasetData = [
            { label: 'T. Reacción (s)', data: registros.map(r => r.tiempo), borderColor: '#fff', tension: 0.3, yAxisID: 'yLeft' },
            { label: 'Vel. Ataque (km/h)', data: registros.map(r => r.kmh), borderColor: '#FFD700', tension: 0.3, yAxisID: 'yRight' },
            { label: 'Vel. Retorno (km/h)', data: registros.map(r => r.vRetorno), borderColor: '#D8B4FE', tension: 0.3, yAxisID: 'yRight' }
          ];
          opcionesEscala = { yLeft: { position: 'left' }, yRight: { position: 'right', grid: { drawOnChartArea: false } } };
      } else {
          let maxValR = Math.max(...registros.map(r => Math.abs(r.bio.bajaRodilla))) || 10;
          let lim = Math.ceil(maxValR * 1.3);
          datasetData = [
            { label: 'Avance Apoyo (cm)', data: registros.map(r => r.bio.avancePieApoyo), borderColor: '#fff', tension: 0.3, yAxisID: 'yLeft' },
            { label: 'Rodilla (cm)', data: registros.map(r => -r.bio.bajaRodilla), borderColor: '#FFD700', tension: 0.1, yAxisID: 'yRight' }
          ];
          opcionesEscala = { yLeft: { position: 'left' }, yRight: { position: 'right', min: -lim, max: lim } };
      }

      myChart = new Chart(ctx, {
        type: 'line', data: { labels: registros.map((_, i) => `G${i+1}`), datasets: datasetData },
        options: { responsive: true, maintainAspectRatio: false, scales: opcionesEscala, plugins: { legend: { labels: { color: '#fff' } } } }
      });

      const header = document.getElementById('table-header');
      const listContainer = document.getElementById('stats-list');
      let html = "";
      if (evalMode === "VELOCIDAD" || currentTab === "SUPERIOR") {
          header.className = "grid-sup";
          header.innerHTML = `<span>#</span><span>T. REACCIÓN</span><span>VEL. ATQ</span><span>RETORNO</span><span>DISTANCIA</span><span>FUERZA</span>`;
          registros.forEach((r, i) => {
            html += `<div class="stat-card grid-sup ${i===bestIdx?'best-hit':i===worstIdx?'worst-hit':''}">
                <span>${i+1}</span><span>${r.tiempo.toFixed(3)}s</span><span>${r.kmh.toFixed(1)}</span><span>${r.vRetorno.toFixed(1)}</span><span>${r.distancia.toFixed(0)}</span><span>${r.fuerza.toFixed(1)}kg</span>
            </div>`;
          });
      } else {
          header.className = "grid-inf";
          header.innerHTML = `<span>#</span><span>AV. APOYO</span><span>AV. ATAQUE</span><span>F. RODILLA</span><span>G. HOMBRO</span><span>G. CADERA</span>`;
          registros.forEach((r, i) => {
            html += `<div class="stat-card grid-inf ${i===bestIdx?'best-hit':''}">
                <span>${i+1}</span><span>${r.bio.avancePieApoyo.toFixed(0)}</span><span>${r.bio.avancePieAtaque.toFixed(0)}</span><span>${r.bio.bajaRodilla.toFixed(0)}</span><span>${r.bio.rotHombro.toFixed(0)}°</span><span>${r.bio.rotCadera.toFixed(0)}°</span>
            </div>`;
          });
      }
      listContainer.innerHTML = html;
    }

    function copiarDatosPortapapeles() {
        const nombre = document.getElementById('atleta-nombre').value;
        let txt = `REPORTE SENSHI-FORM: ${nombre}\n`;
        registros.forEach((r, i) => {
            txt += `G${i+1}: Atq ${r.kmh.toFixed(1)}km/h, Ret ${r.vRetorno.toFixed(1)}km/h, Reacción ${r.tiempo.toFixed(3)}s\n`;
        });
        navigator.clipboard.writeText(txt).then(() => { alert("Copiado."); });
    }

    function prepararAtleta() {
        initAudio(); let cuenta = 5;
        document.getElementById('btn-start-serie').style.display = "none";
        const timer = setInterval(() => {
            statusText.innerText = `PREPÁRATE: ${cuenta}`; playAudio(600, 0.08, "sine"); cuenta--;
            if(cuenta < 0) { clearInterval(timer); iniciarSerie(); }
        }, 1000);
    }

    function esperaAleatoria() {
      modo = "ESPERA"; statusText.innerText = "¡EN GUARDIA!";
      setTimeout(() => {
        if(modo === "ESPERA") {
          const lm = currentLandmarks; const esDerecho = (selectedArm === "R");
          if(lm) {
              calibracionBuzzer.pieAtaqueX = lm[esDerecho?32:31].x; calibracionBuzzer.pieApoyoX = lm[esDerecho?31:32].x;
              calibracionBuzzer.rodillaY = lm[esDerecho?26:25].y;
              calibracionBuzzer.distCaderaBase = Math.abs(lm[23].x - lm[24].x) || 1; calibracionBuzzer.distHombroBase = Math.abs(lm[11].x - lm[12].x) || 1;
              posInicialPuño = { x: lm[esDerecho?16:15].x, y: lm[esDerecho?16:15].y }; 
          }
          modo = "ATAQUE"; t_inicio = performance.now(); playAudio(160, 0.4, "sawtooth"); statusText.innerText = "¡GOLPEA!";
        }
      }, Math.random() * 3000 + 2000);
    }

    async function activarCamara() {
      initAudio();
      const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, facingMode: facingMode, width: 640, height: 480 });
      camera.start(); document.getElementById('btn-camera').style.display = "none"; document.getElementById('btn-start-serie').style.display = "block";
    }

    function iniciarSerie() { registros = []; document.getElementById('results-panel').style.display = "none"; esperaAleatoria(); }
  </script>
</body>
</html>
