<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Senshi-React AI v2.8 - Peak Precision</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #top-controls { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 10px; }
    #status-display { background: rgba(30,30,30,0.95); padding: 15px; border-radius: 10px; border: 3px solid #FFD700; font-size: 22px; font-weight: bold; text-align: center; flex-grow: 1; transition: all 0.1s ease; color: #fff; }
    #main-view { position: relative; flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
    #debug-info { position: absolute; bottom: 100px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-family: monospace; color: #0f0; border: 1px solid #333; font-size: 16px; }
    #arm-selector { display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; }
    .arm-btn { padding: 10px; border: 1px solid #FFD700; background: #222; color: #FFD700; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .arm-btn.active { background: #FFD700; color: #000; }
    button.action-btn { padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase; cursor: pointer; flex: 1; }
    .btn-camera { background: #FFD700; color: #000; }
    .btn-start { background: #fff; color: #000; display: none; }
    #results-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.98); border: 3px solid #FFD700; border-radius: 15px; padding: 25px; display: none; z-index: 400; width: 90%; text-align: center; max-height: 85vh; overflow-y: auto; }
    .stat-card { background: #1a1a1a; padding: 12px; margin: 6px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #FFD700; }
    #series-counter { position: absolute; bottom: 30px; width: 100%; text-align: center; font-weight: bold; color: #FFD700; font-size: 18px; }
    #input_video { display: none; }
  </style>
</head>
<body>

  <div id="top-controls">
    <div class="btn-row">
        <div id="status-display">SISTEMA LISTO</div>
        <div id="arm-selector">
            <div id="btn-left" class="arm-btn" onclick="selectArm('L')">IZQ</div>
            <div id="btn-right" class="arm-btn active" onclick="selectArm('R')">DER</div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btn-camera" class="action-btn btn-camera" onclick="activarCamara()">1. CONECTAR CÁMARA</button>
        <button id="btn-start-serie" class="action-btn btn-start" onclick="iniciarSerie()">2. COMENZAR SERIE</button>
    </div>
  </div>
  
  <div id="main-view">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="debug-info">ANG: --</div>
    
    <div id="results-panel">
      <h2 style="color:#FFD700; margin-top:0;">REPORTE FINAL SENSHI-KAN</h2>
      <div id="stats-summary" style="margin-bottom:20px;"></div>
      <div id="stats-list"></div>
      <button class="action-btn btn-camera" onclick="location.reload()" style="width:100%; margin-top:20px;">NUEVA SESIÓN</button>
    </div>
  </div>

  <div id="series-counter">LISTO</div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status-display');
    const debugText = document.getElementById('debug-info');
    const counterText = document.getElementById('series-counter');

    let modo = "OFF"; 
    let selectedArm = "R";
    let t_inicio = 0;
    let registros = [];
    
    // Lógica de Pico
    let buscandoPico = false;
    let picoMaximo = 0;
    let ultimoAngulo = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBuzzer() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sawtooth";
        osc.frequency.value = 140;
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    function selectArm(side) {
      selectedArm = side;
      document.getElementById('btn-left').classList.toggle('active', side === 'L');
      document.getElementById('btn-right').classList.toggle('active', side === 'R');
    }

    function calcAng(p1, p2, p3) {
      if(!p1 || !p2 || !p3) return 0;
      let angle = (Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x)) * 180 / Math.PI;
      angle = Math.abs(angle);
      if (angle > 180) angle = 360 - angle;
      return angle;
    }

    pose.onResults((res) => {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (res.poseLandmarks) {
        const lm = res.poseLandmarks;
        let p = (selectedArm === 'R') ? [12, 14, 16] : [11, 13, 15];
        let ang = calcAng(lm[p[0]], lm[p[1]], lm[p[2]]);

        // Visualización
        const color = selectedArm === 'R' ? '#FFD700' : '#00E5FF';
        canvasCtx.beginPath();
        canvasCtx.moveTo(lm[p[0]].x * canvasElement.width, lm[p[0]].y * canvasElement.height);
        canvasCtx.lineTo(lm[p[1]].x * canvasElement.width, lm[p[1]].y * canvasElement.height);
        canvasCtx.lineTo(lm[p[2]].x * canvasElement.width, lm[p[2]].y * canvasElement.height);
        canvasCtx.strokeStyle = "white"; canvasCtx.lineWidth = 4; canvasCtx.stroke();
        drawLandmarks(canvasCtx, [lm[p[0]], lm[p[1]], lm[p[2]]], {color: color, lineWidth: 2});
        
        debugText.innerText = `ÁNGULO ACTUAL: ${Math.round(ang)}°`;

        if (modo === "ATAQUE") {
          // Si cruzamos el umbral de 165°, empezamos a buscar el pico
          if (!buscandoPico && ang > 165) {
            buscandoPico = true;
            picoMaximo = ang;
          }

          if (buscandoPico) {
            // Mientras el brazo siga extendiéndose, actualizamos el pico
            if (ang >= picoMaximo) {
              picoMaximo = ang;
            } else {
              // Si el ángulo empieza a disminuir (ang < picoMaximo), 
              // significa que el brazo ya alcanzó su máxima extensión.
              // DETENEMOS EL RELOJ AQUÍ.
              finalizarGolpe(picoMaximo);
            }
          }
        }
        ultimoAngulo = ang;
      }
      canvasCtx.restore();
    });

    function finalizarGolpe(maxExt) {
      const t_final = performance.now();
      const duracion = (t_final - t_inicio) / 1000;
      
      buscandoPico = false;
      modo = "PAUSA";
      
      registros.push({ tiempo: duracion, extension: maxExt });
      
      // Feedback semáforo
      if (duracion < 0.50) {
        statusText.style.background = "#28a745";
        statusText.innerText = `EXCELENTE! ${duracion.toFixed(3)}s`;
      } else if (duracion <= 0.70) {
        statusText.style.background = "#ffc107"; statusText.style.color = "#000";
        statusText.innerText = `BIEN: ${duracion.toFixed(3)}s`;
      } else {
        statusText.style.background = "#dc3545";
        statusText.innerText = `MUY LENTO: ${duracion.toFixed(3)}s`;
      }

      counterText.innerText = `PROGRESO: ${registros.length} / 10`;
      if (registros.length < 10) setTimeout(esperaAleatoria, 2500);
      else mostrarReporte();
    }

    function mostrarReporte() {
      modo = "FIN";
      const avgT = (registros.reduce((a, b) => a + b.tiempo, 0) / 10).toFixed(3);
      const maxE = Math.max(...registros.map(r => r.extension)).toFixed(1);
      
      document.getElementById('stats-summary').innerHTML = `
        <h1 style="color:#FFD700; font-size:48px; margin:0;">${avgT}s</h1>
        <p style="margin:5px 0;">PROMEDIO DE REACCIÓN TOTAL</p>
        <p style="color:#00E5FF;">MÁXIMA EXTENSIÓN ALCANZADA: ${maxE}°</p>
      `;

      let html = "";
      registros.forEach((r, i) => {
        html += `
          <div class="stat-card">
            <span>GOLPE ${i+1}</span>
            <span style="color:#FFD700; font-weight:bold;">${r.tiempo.toFixed(3)}s</span>
            <span>Extensión: ${Math.round(r.extension)}°</span>
          </div>`;
      });
      document.getElementById('stats-list').innerHTML = html;
      document.getElementById('results-panel').style.display = "block";
    }

    function esperaAleatoria() {
      modo = "ESPERA";
      statusText.style.background = "#1a1a1a"; statusText.style.color = "#fff";
      statusText.innerText = "¡EN GUARDIA!";
      setTimeout(() => {
        if(modo === "ESPERA") {
          modo = "ATAQUE";
          t_inicio = performance.now();
          playBuzzer();
          statusText.innerText = "¡YA!";
          statusText.style.background = "#f00";
        }
      }, Math.random() * 3000 + 2000);
    }

    async function activarCamara() {
      const cam = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
      });
      await cam.start();
      document.getElementById('btn-camera').style.display = "none";
      document.getElementById('btn-start-serie').style.display = "block";
    }

    function iniciarSerie() {
      registros = [];
      document.getElementById('results-panel').style.display = "none";
      esperaAleatoria();
    }
  </script>
</body>
</html>
